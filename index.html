<!DOCTYPE html>
<html lang="es"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Underwave Diagnostic™</title>
<style>
:root{
  --co2:#F4C616; --auto:#2E7BE0; --efic:#16A085; --recup:#3FC4E0;
  --bg1:#0C2740; --bg2:#05121F; --ink:#DCE7F0; --muted:#7FA8C9; --grid:#1C3A5C;
  --strong:#2BD49A; --mid:#F2B33A; --weak:#FF4D5E;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"Inter","Helvetica Neue",Arial,sans-serif;color:var(--ink);
  background:linear-gradient(177deg,var(--bg1),#071A2E 60%,var(--bg2)) fixed;min-height:100vh;padding:22px 18px 40px;}
.wrap{max-width:1080px;margin:0 auto;}
.head{display:flex;align-items:flex-end;justify-content:space-between;border-bottom:1.5px solid var(--co2);padding-bottom:12px;flex-wrap:wrap;gap:8px;}
.brand{font-size:12px;letter-spacing:3px;color:var(--muted);}
.brand b{color:#fff;}
.title{font-size:26px;font-weight:800;letter-spacing:.5px;}
.title span{color:var(--co2);}
.namewrap{display:flex;align-items:center;gap:8px;}
.namewrap input{background:#0e2742;border:1px solid var(--grid);color:#fff;border-radius:8px;padding:7px 10px;font-size:14px;width:180px;}
.grid{display:grid;grid-template-columns:1fr 1.05fr;gap:26px;margin-top:22px;}
@media(max-width:820px){.grid{grid-template-columns:1fr;}}
.panel h2{font-size:12px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:14px;}
.test{margin-bottom:15px;}
.test .row{display:flex;align-items:center;gap:8px;}
.test .dot{width:10px;height:10px;border-radius:50%;flex:none;}
.test .nm{font-size:14px;font-weight:600;}
.test .val{margin-left:auto;font-size:14px;font-weight:700;color:#fff;background:#0e2742;border:1px solid var(--grid);border-radius:6px;padding:1px 8px;min-width:42px;text-align:center;}
.test .ref{font-size:11px;color:var(--muted);margin:3px 0 6px 18px;}
.test .rv{margin-left:18px;background:#0e2742;border:1px solid var(--grid);color:#fff;border-radius:8px;padding:8px 11px;font-size:15px;width:130px;}
.test select.rv{width:auto;max-width:230px;cursor:pointer;}
.test .rv:focus{outline:none;border-color:var(--co2);}
input[type=range]{-webkit-appearance:none;appearance:none;height:7px;border-radius:5px;background:#13294a;outline:none;margin-left:18px;width:calc(100% - 18px);}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#fff;border:3px solid var(--thumb,#F4C616);cursor:pointer;box-shadow:0 0 0 2px rgba(0,0,0,.25);}
input[type=range]::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:#fff;border:3px solid var(--thumb,#F4C616);cursor:pointer;}
.radarbox{background:rgba(8,22,38,.45);border:1px solid var(--grid);border-radius:14px;padding:10px 10px 4px;}
svg{width:92%;margin:0 auto;display:block;overflow:visible;}
.legend{text-align:center;font-size:11px;color:var(--muted);margin:2px 0 16px;}
.legend b{color:var(--co2);} .legend i{color:var(--auto);font-style:normal;}
.pillar{margin-bottom:12px;}
.pillar .top{display:flex;align-items:center;font-size:14px;margin-bottom:5px;}
.pillar .pd{width:11px;height:11px;border-radius:50%;margin-right:9px;}
.pillar .pv{margin-left:auto;font-weight:800;}
.track{height:9px;background:#13294a;border-radius:5px;overflow:hidden;border:1px solid var(--grid);}
.fill{height:100%;border-radius:5px;transition:width .25s,background .25s;}
.call{margin-top:16px;border-radius:10px;padding:13px 15px;}
.call .k{font-size:11px;letter-spacing:2px;text-transform:uppercase;}
.call .v{font-size:15px;margin-top:5px;line-height:1.45;color:var(--ink);}
.call.bad{border:1px solid var(--weak);border-left:5px solid var(--weak);background:rgba(255,77,94,.08);}
.call.bad .k{color:#FF8590;} .call.bad .v b{color:#FF9AA4;}
.call.mid{border:1px solid var(--mid);border-left:5px solid var(--mid);background:rgba(242,179,58,.08);}
.call.mid .k{color:#F6C76A;} .call.mid .v b{color:#F6C76A;}
.call.good{border:1px solid var(--strong);border-left:5px solid var(--strong);background:rgba(43,212,154,.08);}
.call.good .k{color:#55E0B0;} .call.good .v b{color:#6FE7BE;}
.score{display:flex;align-items:center;gap:14px;margin-top:16px;background:rgba(8,22,38,.45);border:1px solid var(--grid);border-radius:12px;padding:12px 16px;}
.score .ring{font-size:30px;font-weight:800;color:var(--co2);}
.score .lbl b{font-size:14px;} .score .lbl div{font-size:12px;color:var(--muted);}
.foot{margin-top:26px;text-align:center;font-size:11px;letter-spacing:2px;color:var(--muted);}
.foot b{color:#fff;}
.note{font-size:11px;color:var(--muted);margin-top:6px;text-align:center;}
#report{background:linear-gradient(177deg,#0C2740,#071A2E 70%,#05121F);border:1px solid var(--grid);border-radius:14px;padding:16px 18px 12px;}
.rephead{display:flex;justify-content:space-between;align-items:center;border-bottom:1.5px solid var(--co2);padding-bottom:10px;margin-bottom:8px;flex-wrap:wrap;gap:10px;}
.rephead .rhr{text-align:right;}
.rephead .eyebrow{font-size:9.5px;letter-spacing:2.5px;color:var(--co2);font-weight:700;text-transform:uppercase;margin-bottom:3px;}
.rephead .rn{font-size:19px;font-weight:800;color:#fff;letter-spacing:.3px;}
.rephead .rd{font-size:11px;font-weight:400;color:var(--muted);margin-left:10px;}
.logo{display:flex;align-items:center;gap:11px;}
.logo .wm{display:flex;flex-direction:column;}
.logo .w1{color:#fff;font-weight:800;letter-spacing:3.5px;font-size:15px;line-height:1;}
.logo .w2{color:var(--co2);font-weight:600;letter-spacing:2px;font-size:8px;line-height:1;margin-top:4px;}
.repfoot{margin-top:14px;text-align:center;font-size:9.5px;letter-spacing:2px;color:var(--muted);} .repfoot b{color:#fff;}
.actions{display:flex;gap:10px;margin-top:16px;}
.actions button{flex:1;padding:12px;border-radius:10px;border:1px solid var(--co2);background:rgba(244,198,22,.12);color:#F4C616;font-size:14px;font-weight:700;cursor:pointer;transition:background .15s;}
.actions button:hover{background:rgba(244,198,22,.22);}
.actions #sh{border-color:var(--auto);background:rgba(46,123,224,.14);color:#7FB6F0;}
.actions #sh:hover{background:rgba(46,123,224,.24);}

.langtog{display:inline-flex;border:1px solid var(--grid);border-radius:8px;overflow:hidden;}
.langtog button{background:#0e2742;color:var(--muted);border:none;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;}
.langtog button.on{background:var(--co2);color:#0A1B2E;}
</style></head>

     est:{nm:"TLC Breath-hold (total lung capacity)",short:"TLC Breath-hold",ref:"mm:ss · comfort · 2:00+ = optimal"},
     co2s:{nm:"CO₂ swimming",ref:"blocks 4-6-8-10",opts:["Doesn’t reach block 6","Completes to block 6","Completes to block 8","200m · high RPE","200m · low RPE"]},
     crol:{nm:"100m freestyle",ref:"mm:ss · <1:20 = optimal"},
     uo:{nm:"Under-Overs 200m",ref:"mm:ss · <3:45 = optimal"},
     tab:{nm:"Dynamic tables",ref:"8×25 · total time mm:ss · 8min = optimal"},
     post:{nm:"Post-effort recovery",ref:"seconds to calm · 25s = near optimal"}},
   shareTitle:"Underwave Diagnostic",shareText:"Your Underwave profile",locale:"en-US"}
};
let lang='es'; try{const s=localStorage.getItem('uwlang'); if(s&&T[s])lang=s;}catch(e){}
function tt(){return T[lang];}
function testNm(k){return tt().tests[k].nm;} function testRef(k){return tt().tests[k].ref;} function pilName(k){return tt().pil[k];} function testShort(k){return tt().tests[k].short||tt().tests[k].nm;}

const TESTS=[
 {key:'bolt',pil:'co2',kind:'sec',def:'35',anc:[[10,2],[20,4],[30,6],[40,9],[50,10]]},
 {key:'vr',pil:'co2',kind:'sec',def:'30',anc:[[10,2],[15,4],[30,6],[40,8],[45,9],[55,10]]},
 {key:'est',pil:'auto',kind:'time',def:'1:30',anc:[[30,2],[45,4],[75,6],[120,9],[150,10]]},
 {key:'co2s',pil:'co2',kind:'select',def:6,optScores:[3,4,6,8,10]},
 {key:'crol',pil:'efic',kind:'time',def:'1:45',anc:[[78,10],[105,8],[135,6],[150,4],[185,2.5]]},
 {key:'uo',pil:'efic',kind:'time',def:'4:15',anc:[[200,10],[225,9],[270,7],[330,5],[360,3.5]]},
 {key:'tab',pil:'recup',kind:'time',def:'12:00',anc:[[480,10],[720,7],[1080,4],[1200,2]]},
 {key:'post',pil:'recup',kind:'sec',def:'45',anc:[[18,10],[25,9],[45,7],[90,4],[110,2.5]]},
];
const W={bolt:[3.0,1.0,0.0,0.0],vr:[3.0,1.5,0.0,0.0],est:[1.5,3.0,0.0,0.0],co2s:[2.5,1.0,1.5,0.5],crol:[0.0,0.5,3.0,0.5],uo:[1.5,1.0,2.5,1.5],tab:[1.5,1.0,1.5,3.0],post:[0.0,1.5,0.5,3.0]};
const PIL=[{key:'co2',col:COL.co2,idx:0},{key:'auto',col:COL.auto,idx:1},{key:'efic',col:COL.efic,idx:2},{key:'recup',col:COL.recup,idx:3}];

function parseTime(str){str=(''+str).trim(); if(!str)return NaN; if(str.includes(':')){const a=str.split(':'); return (parseFloat(a[0])||0)*60+(parseFloat(a[1])||0);} return parseFloat(str);}
function interp(anc,v){ if(v<=anc[0][0])return anc[0][1]; const L=anc.length; if(v>=anc[L-1][0])return anc[L-1][1]; for(let i=0;i<L-1;i++){const[x0,y0]=anc[i],[x1,y1]=anc[i+1]; if(v>=x0&&v<=x1)return y0+(v-x0)/(x1-x0)*(y1-y0);} return 0;}
function clamp10(x){return Math.max(0,Math.min(10,x));}
function normVal(t,raw){ if(t.kind==='select')return parseFloat(raw); const s=parseTime(raw); if(isNaN(s))return null; return clamp10(interp(t.anc,s)); }
function bandColor(v){return v>=7?'var(--strong)':(v>=5?'var(--mid)':'var(--weak)');}
function upScore(key){const el=document.getElementById('v_'+key); const v=vals[key]; el.textContent=v.toFixed(1); el.style.color=bandColor(v);}

const vals={}; const raw={}; TESTS.forEach(t=>{raw[t.key]=t.def; const v=normVal(t,t.def); vals[t.key]=(v==null?0:v);});

function buildInputs(){
  const inp=document.getElementById('inputs'); inp.innerHTML='';
  TESTS.forEach(t=>{
    const d=document.createElement('div'); d.className='test'; let field;
    if(t.kind==='select'){
      const labels=tt().tests[t.key].opts;
      field='<select class="rv" id="i_'+t.key+'">'+t.optScores.map((sc,i)=>'<option value="'+sc+'" '+((''+sc===''+raw[t.key])?'selected':'')+'>'+labels[i]+'</option>').join('')+'</select>';
    } else {
      const ph=(t.kind==='time')?tt().phTime:tt().phSec;
      field='<input class="rv" type="text" inputmode="numeric" value="'+raw[t.key]+'" placeholder="'+ph+'">';
    }
    d.innerHTML='<div class="row"><span class="dot" style="background:'+COL[t.pil]+'"></span><span class="nm">'+testNm(t.key)+'</span><span class="val" id="v_'+t.key+'"></span></div><div class="ref">'+testRef(t.key)+'</div>'+field;
    inp.appendChild(d);
    const el=d.querySelector('.rv'); const ev=(t.kind==='select')?'change':'input';
    el.addEventListener(ev,e=>{ raw[t.key]=e.target.value; const v=normVal(t,e.target.value); if(v!=null)vals[t.key]=v; upScore(t.key); render(); });
    upScore(t.key);
  });
}

const cx=300,cy=300,R=205,n=TESTS.length;
function pt(i,val){const a=(-90+360/n*i)*Math.PI/180; const r=val/10*R; return [cx+r*Math.cos(a),cy+r*Math.sin(a)];}
const svg=document.getElementById('radar'); const NS='http://www.w3.org/2000/svg';
function mk(tag,attrs){const e=document.createElementNS(NS,tag);for(const k in attrs)e.setAttribute(k,attrs[k]);return e;}
let targetPoly,alumnoPoly,dotsG,labelsG;
function buildStatic(){
  while(svg.firstChild)svg.removeChild(svg.firstChild);
  [2,4,6,8,10].forEach(g=>{let p=[];for(let i=0;i<n;i++){const[x,y]=pt(i,g);p.push(x.toFixed(1)+','+y.toFixed(1));} svg.appendChild(mk('polygon',{points:p.join(' '),fill:'none',stroke:'#2A4F74','stroke-width':1}));});
  for(let i=0;i<n;i++){const[x,y]=pt(i,10); svg.appendChild(mk('line',{x1:cx,y1:cy,x2:x.toFixed(1),y2:y.toFixed(1),stroke:'#2A4F74','stroke-width':1}));}
  targetPoly=mk('polygon',{points:'',fill:'none',stroke:'#2E7BE0','stroke-width':2,'stroke-dasharray':'6 5',opacity:0.65});
  alumnoPoly=mk('polygon',{points:'',fill:'#F4C616','fill-opacity':0.30,stroke:'#F4C616','stroke-width':3.5,'stroke-linejoin':'round'});
  dotsG=mk('g',{}); labelsG=mk('g',{});
  svg.appendChild(targetPoly); svg.appendChild(alumnoPoly); svg.appendChild(dotsG); svg.appendChild(labelsG);
}
const TARGET=[8,8,8,8,8,8,8,8];
function render(){
  let tp=[],ap=[];
  for(let i=0;i<n;i++){const[tx,ty]=pt(i,TARGET[i]); tp.push(tx.toFixed(1)+','+ty.toFixed(1)); const[ax,ay]=pt(i,vals[TESTS[i].key]); ap.push(ax.toFixed(1)+','+ay.toFixed(1));}
  targetPoly.setAttribute('points',tp.join(' ')); alumnoPoly.setAttribute('points',ap.join(' '));
  while(dotsG.firstChild)dotsG.removeChild(dotsG.firstChild); while(labelsG.firstChild)labelsG.removeChild(labelsG.firstChild);
  for(let i=0;i<n;i++){const t=TESTS[i]; const[ax,ay]=pt(i,vals[t.key]);
    dotsG.appendChild(mk('circle',{cx:ax.toFixed(1),cy:ay.toFixed(1),r:4.5,fill:COL[t.pil],stroke:'#0C2740','stroke-width':1.5}));
    const[lx,ly]=pt(i,11.0); let anc='middle'; if(lx>cx+6)anc='start'; else if(lx<cx-6)anc='end';
    const t1=mk('text',{x:lx.toFixed(0),y:ly.toFixed(0),'text-anchor':anc,fill:'#C9D6E4','font-size':12,'font-weight':600}); t1.textContent=testShort(t.key); labelsG.appendChild(t1);
    const t2=mk('text',{x:lx.toFixed(0),y:(ly+14).toFixed(0),'text-anchor':anc,fill:COL[t.pil],'font-size':11,'font-weight':700}); t2.textContent=vals[t.key].toFixed(1); labelsG.appendChild(t2);
  }
  const ph=document.getElementById('pillars'); ph.innerHTML=''; let pscores=[];
  PIL.forEach(p=>{
    let num=0,den=0; TESTS.forEach(t=>{const w=W[t.key][p.idx]; num+=w*vals[t.key]; den+=w;});
    const avg=den?num/den:0; pscores.push({nm:pilName(p.key),v:avg,col:p.col});
    const c=avg>=7?'var(--strong)':(avg>=5?'var(--mid)':'var(--weak)');
    const d=document.createElement('div'); d.className='pillar';
    d.innerHTML='<div class="top"><span class="pd" style="background:'+p.col+'"></span>'+pilName(p.key)+'<span class="pv" style="color:'+c+'">'+avg.toFixed(1)+'/10</span></div><div class="track"><div class="fill" style="width:'+(avg*10)+'%;background:'+c+'"></div></div>';
    ph.appendChild(d);
  });
  const overall=pscores.reduce((a,p)=>a+p.v,0)/pscores.length; const sc=Math.round(overall*10);
  document.getElementById('score').textContent=sc;
  const Lv=tt().levels; let lvl,lvlcol;
  if(sc>=85){lvl=Lv.wm;lvlcol='var(--strong)';}else if(sc>=70){lvl=Lv.adv;lvlcol='var(--co2)';}else if(sc>=55){lvl=Lv.dev;lvlcol='var(--mid)';}else if(sc>=40){lvl=Lv.base;lvlcol='var(--mid)';}else{lvl=Lv.ini;lvlcol='var(--weak)';}
  document.getElementById('level').textContent=lvl; document.getElementById('score').style.color=lvlcol;
  const sorted=[...pscores].sort((a,b)=>a.v-b.v); const lo=sorted[0]; let names=[lo.nm];
  if(sorted[1].v<7 && (sorted[1].v-lo.v)<1.2) names.push(sorted[1].nm); const list=names.join(' + ');
  const call=document.getElementById('call'); const TI=tt().tiers; let cls,k,msg;
  if(lo.v>=8.5){cls='good';k=TI.eliteK;msg=TI.eliteM;}
  else if(lo.v>=7){cls='good';k=TI.solidK;msg=TI.solidM;}
  else if(lo.v>=5){cls='mid';k=TI.midK;msg=TI.midM.replace('{X}',list);}
  else{cls='bad';k=TI.badK;msg=TI.badM.replace('{X}',list);}
  call.className='call '+cls; call.innerHTML='<div class="k">'+k+'</div><div class="v">'+msg+'</div>';
}

const nameInput=document.getElementById('alumno');
nameInput.addEventListener('input',()=>{const v=nameInput.value.trim();document.getElementById('repname').textContent=v||tt().repnameDefault;});

function applyLang(){
  const t=tt(); document.documentElement.lang=lang; document.title=t.docTitle;
  document.querySelectorAll('.w2').forEach(e=>e.textContent=t.brandSub);
  document.getElementById('pageTitle').innerHTML=t.titleHtml;
  document.getElementById('alumnoLabel').textContent=t.alumnoLabel;
  document.getElementById('alumno').placeholder=t.namePh;
  document.getElementById('panelH2').textContent=t.panelH2;
  document.getElementById('eyebrow').textContent=t.eyebrow;
  document.getElementById('legend').innerHTML=t.legendHtml;
  document.getElementById('pillarsH2').textContent=t.pillarsH2;
  document.getElementById('scoreSub').textContent=t.scoreSub;
  document.getElementById('dl').textContent=t.dl; document.getElementById('sh').textContent=t.sh;
  document.getElementById('foot').innerHTML=t.foot; document.getElementById('note').textContent=t.note;
  document.getElementById('lgEs').classList.toggle('on',lang==='es'); document.getElementById('lgEn').classList.toggle('on',lang==='en');
  const nm=document.getElementById('alumno').value.trim(); document.getElementById('repname').textContent=nm||t.repnameDefault;
  document.getElementById('repdate').textContent=new Date().toLocaleDateString(t.locale);
  buildInputs(); render(); try{localStorage.setItem('uwlang',lang);}catch(e){}
}
function setLang(l){lang=l;applyLang();}

function nameSafe(){return (nameInput.value.trim()||'student').replace(/[^a-z0-9]+/gi,'_');}
function capture(){return html2canvas(document.getElementById('report'),{backgroundColor:'#0C2740',scale:2,useCORS:true,logging:false});}
document.getElementById('dl').addEventListener('click',()=>{capture().then(c=>c.toBlob(b=>{const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='Profile_'+nameSafe()+'.png';document.body.appendChild(a);a.click();a.remove();}));});
document.getElementById('sh').addEventListener('click',()=>{capture().then(c=>c.toBlob(async b=>{const file=new File([b],'Profile_'+nameSafe()+'.png',{type:'image/png'});if(navigator.canShare && navigator.canShare({files:[file]})){try{await navigator.share({files:[file],title:tt().shareTitle,text:tt().shareText});}catch(e){}}else{const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=file.name;document.body.appendChild(a);a.click();a.remove();}}));});

buildStatic(); applyLang();
</script>
